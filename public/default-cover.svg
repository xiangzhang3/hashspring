<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#142750"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
    <radialGradient id="glow" cx="65%" cy="35%" r="40%">
      <stop offset="0%" style="stop-color:rgba(59,130,246,0.35)"/>
      <stop offset="100%" style="stop-color:rgba(59,130,246,0)"/>
    </radialGradient>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="75" x2="800" y2="75"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="133" y1="0" x2="133" y2="450"/>
    <line x1="266" y1="0" x2="266" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="533" y1="0" x2="533" y2="450"/>
    <line x1="666" y1="0" x2="666" y2="450"/>
  </g>
  <!-- Logo circle -->
  <circle cx="400" cy="185" r="42" fill="url(#logo-gradient)"/>
  <text x="400" y="203" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="900">H</text>
  <!-- Brand text -->
  <text x="400" y="262" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="800" letter-spacing="1">HashSpring</text>
  <!-- Tagline -->
  <text x="400" y="290" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" letter-spacing="3" text-transform="uppercase">GLOBAL CRYPTO INTELLIGENCE</text>
</svg>
